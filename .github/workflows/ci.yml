name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

env:
  CARGO_TERM_COLOR: always

jobs:
  test-rust:
    name: Test Rust (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            packages/meeting-detector/native/target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libx11-dev libxcb1-dev libpulse-dev

      - name: Run Rust tests
        working-directory: packages/meeting-detector/native
        run: cargo test --verbose

      - name: Check Rust formatting
        working-directory: packages/meeting-detector/native
        run: cargo fmt -- --check

      - name: Clippy
        working-directory: packages/meeting-detector/native
        run: cargo clippy -- -D warnings

  build-native:
    name: Build Native (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    needs: test-rust
    strategy:
      fail-fast: false
      matrix:
        include:
          # macOS Universal
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact: meeting-detector-native.darwin-x64.node
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: meeting-detector-native.darwin-arm64.node
          # Windows
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: meeting-detector-native.win32-x64-msvc.node
          # Linux
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: meeting-detector-native.linux-x64-gnu.node

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libx11-dev libxcb1-dev libpulse-dev

      - name: Install napi-rs CLI
        run: npm install -g @napi-rs/cli

      - name: Build native module
        working-directory: packages/meeting-detector
        run: |
          napi build --cwd native --package-json-path ../package.json --output-dir .. --target ${{ matrix.target }} --release

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: packages/meeting-detector/*.node
          if-no-files-found: error

  test-typescript:
    name: Test TypeScript
    runs-on: macos-latest
    needs: build-native

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Download macOS artifact
        uses: actions/download-artifact@v4
        with:
          name: meeting-detector-native.darwin-arm64.node
          path: packages/meeting-detector/

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run typecheck

      - name: Run tests
        run: npm test
