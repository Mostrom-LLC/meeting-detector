name: Publish Package

on:
  push:
    tags:
      - 'v*'

env:
  CARGO_TERM_COLOR: always

jobs:
  build-native:
    name: Build Native (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: true
      matrix:
        include:
          # macOS Universal
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact: darwin-x64
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: darwin-arm64
          # Windows
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: win32-x64-msvc
          # Linux
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: linux-x64-gnu

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libx11-dev libxcb1-dev libpulse-dev

      - name: Install napi-rs CLI
        run: npm install -g @napi-rs/cli

      - name: Build native module
        working-directory: packages/meeting-detector
        run: |
          napi build --cwd native --package-json-path ../package.json --output-dir .. --target ${{ matrix.target }} --release

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: native-${{ matrix.artifact }}
          path: packages/meeting-detector/*.node
          if-no-files-found: error

  publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    needs: build-native
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Download all native artifacts
        uses: actions/download-artifact@v4
        with:
          path: packages/meeting-detector/native-artifacts/

      - name: Move artifacts to package root
        working-directory: packages/meeting-detector
        run: |
          mv native-artifacts/native-darwin-x64/*.node . 2>/dev/null || true
          mv native-artifacts/native-darwin-arm64/*.node . 2>/dev/null || true
          mv native-artifacts/native-win32-x64-msvc/*.node . 2>/dev/null || true
          mv native-artifacts/native-linux-x64-gnu/*.node . 2>/dev/null || true
          ls -la *.node

      - name: Install dependencies
        run: npm ci

      - name: Build TypeScript
        run: npm run build

      - name: Verify package
        working-directory: packages/meeting-detector
        run: npm publish --dry-run

      - name: Publish to npm
        working-directory: packages/meeting-detector
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
